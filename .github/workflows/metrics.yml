name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * 6"  # Runs weekly on Saturday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Shanghai

      - name: Push to output branch
        run: |
          cp github-metrics.svg /tmp/github-metrics.svg
          cd $GITHUB_WORKSPACE
          git clone --depth 1 --branch output https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} output-branch || true
          if [ ! -d "output-branch/.git" ]; then
            mkdir -p output-branch
            cd output-branch
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          else
            cd output-branch
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/github-metrics.svg .
          git add github-metrics.svg
          git commit -m "Update metrics SVG" || echo "No changes"
          git branch -M output
          git push origin output --force
