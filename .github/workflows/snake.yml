name: Generate All Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Clone and run github-readme-stats locally
        env:
          USER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          mkdir -p dist

          # Clone github-readme-stats (from our fork)
          git clone --depth 1 https://github.com/ChuyuChoyeon/github-readme-stats.git /tmp/grs
          cd /tmp/grs
          npm install

          # The Vercel handler exports a handler(req, res) function
          # We need to simulate a request with query parameters
          # Use a helper script that calls the handler directly
          cat > /tmp/gen.js << 'SCRIPT'
          const { handler } = require('/tmp/grs/api/index.js');
          const fs = require('fs');
          const http = require('http');

          async function gen(queryStr, outFile) {
            return new Promise((resolve) => {
              const req = http.IncomingMessage({});
              const res = new http.ServerResponse(req);
              let body = '';
              res.on('data', (c) => body += c);
              res.end = () => {
                fs.writeFileSync(outFile, body);
                const ok = body.startsWith('<svg');
                console.log((ok ? '✅' : '❌') + ' ' + outFile);
                resolve();
              };
              res.setHeader = () => {};
              req.url = '/?' + queryStr;
              req.query = new URLSearchParams(queryStr);
              handler(req, res);
            });
          }

          (async () => {
            const u = process.env.USER;
            await gen('username='+u+'&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&icon_color=58a6ff&ring_color=58a6ff&include_all_commits=true&count_private=true', process.env.OUTDIR+'/github-stats.svg');
            await gen('username='+u+'&layout=donut-vertical&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&langs_count=10&exclude_repo=fastapi,Rosetta', process.env.OUTDIR+'/top-langs.svg');
            await gen('username='+u+'&repo=Rosetta&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&icon_color=58a6ff&desc_color=8b949e', process.env.OUTDIR+'/pin-rosetta.svg');
            await gen('username='+u+'&repo=choyeon-todo&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&icon_color=58a6ff&desc_color=8b949e', process.env.OUTDIR+'/pin-choyeon-todo.svg');
            await gen('username='+u+'&repo=choyeon-note&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&icon_color=58a6ff&desc_color=8b949e', process.env.OUTDIR+'/pin-choyeon-note.svg');
          })();
          SCRIPT

          OUTDIR=$GITHUB_WORKSPACE/dist USER=$USER node /tmp/gen.js

      - name: Download other SVGs (streak, activity, header, typing)
        env:
          USER: ${{ github.repository_owner }}
        run: |
          mkdir -p dist
          # Streak stats
          curl -sL "https://github-readme-streak-stats.herokuapp.com?user=$USER&theme=tokyonight&hide_border=true&background=0d1117&stroke=58a6ff&ring=58a6ff&fire=ff6b6b&currStreakLabel=58a6ff&sideLabels=c9d1d9&currStreakNum=ffffff&sideNums=c9d1d9&dates=555555" -o dist/streak-stats.svg
          # Activity graph
          curl -sL "https://github-readme-activity-graph.vercel.app/graph?username=$USER&bg_color=0d1117&color=58a6ff&line=58a6ff&point=ffffff&area=true&hide_border=true&radius=8&height=300" -o dist/activity-graph.svg
          # Header
          curl -sL "https://capsule-render.vercel.app/api?type=waving&color=gradient&customColorList=6,11,20&height=180&section=header&text=$USER&fontSize=42&fontColor=ffffff&animation=twinkling&fontAlignY=32&desc=Full-Stack%20Developer%20%7C%20Open%20Source%20Enthusiast&descSize=18&descAlignY=52" -o dist/header.svg
          # Typing
          curl -sL "https://readme-typing-svg.demolab.com?font=JetBrains+Mono&weight=600&size=24&pause=1000&color=58A6FF&center=true&vCenter=true&random=false&width=600&lines=Hello+World+%F0%9F%91%8B;I%27m+$USER+%E9%9B%A8%E8%BF%87%E5%88%9D%E6%99%B4;Python+Developer+%7C+Vue.js+%7C+Electron;Building+things+that+matter+%F0%9F%9A%80&separator=%3B" -o dist/typing.svg

      - name: List all generated files
        run: ls -la dist/

      - name: Push all SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
